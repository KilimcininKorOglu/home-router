{{ define "dns-stats" }}
{{ if .Stats }}
<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:var(--space-lg);">
    <div class="stat-card">
        <div class="stat-label">Total Queries</div>
        <div class="stat-value">{{ .Stats.TotalQueries }}</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Cache Hits</div>
        <div class="stat-value">{{ .Stats.CacheHits }}</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Cache Misses</div>
        <div class="stat-value">{{ .Stats.CacheMisses }}</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">Blocked</div>
        <div class="stat-value" style="color:var(--accent-red);">{{ .Stats.BlockedCount }}</div>
    </div>
</div>
{{ end }}
{{ end }}

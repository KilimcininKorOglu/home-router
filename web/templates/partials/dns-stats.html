{{ define "dns-stats" }}
{{ if .Stats }}
<div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:var(--space-lg);">
    <div class="stat-card">
        <div class="stat-label">{{ t $.Lang "dns.totalQueries" }}</div>
        <div class="stat-value">{{ .Stats.TotalQueries }}</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">{{ t $.Lang "dns.cacheHits" }}</div>
        <div class="stat-value">{{ .Stats.CacheHits }}</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">{{ t $.Lang "dns.cacheMisses" }}</div>
        <div class="stat-value">{{ .Stats.CacheMisses }}</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">{{ t $.Lang "dns.blocked" }}</div>
        <div class="stat-value" style="color:var(--accent-red);">{{ .Stats.BlockedCount }}</div>
    </div>
</div>
{{ end }}
{{ end }}

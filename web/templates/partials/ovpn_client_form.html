{{ define "ovpn_client_form" }}
<form hx-post="/openvpn/server/client" style="display:flex; gap:var(--space-sm); margin-top:var(--space-md);">
    <input class="input" name="name" placeholder="{{ t .Lang "common.name" }}" required style="flex:1;">
    <button type="submit" class="btn btn-primary btn-sm">{{ t .Lang "openvpn.addClient" }}</button>
</form>
{{ end }}

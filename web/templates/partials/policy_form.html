{{ define "policy_form" }}
<form hx-post="/routing/policy" hx-swap="none" hx-on::after-request="this.reset();">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-md); margin-bottom:var(--space-md);">
        <div class="input-group">
            <label class="input-label">{{ t .Lang "common.name" }}</label>
            <input class="input" name="name" required>
        </div>
        <div class="input-group">
            <label class="input-label">{{ t .Lang "routing.tunnel" }}</label>
            <input class="input" name="tunnel" placeholder="nl-amsterdam" required>
        </div>
    </div>
    <div class="input-group" style="margin-bottom:var(--space-md);">
        <label class="input-label">{{ t .Lang "routing.source" }} (MAC)</label>
        <input class="input" name="srcMacs" placeholder="aa:bb:cc:dd:ee:ff">
    </div>
    <div class="input-group" style="margin-bottom:var(--space-md);">
        <label class="input-label">{{ t .Lang "routing.source" }} (IP)</label>
        <input class="input" name="srcIps" placeholder="10.10.10.50">
    </div>
    <div class="input-group" style="margin-bottom:var(--space-md);">
        <label class="input-label">{{ t .Lang "routing.destination" }} (IP/CIDR)</label>
        <input class="input" name="dstIps" placeholder="1.2.3.0/24">
    </div>
    <div class="input-group" style="margin-bottom:var(--space-md);">
        <label class="input-label">Domains</label>
        <textarea class="input" name="domains" rows="3" placeholder="netflix.com&#10;*.youtube.com"></textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-sm">{{ t .Lang "common.save" }}</button>
</form>
{{ end }}

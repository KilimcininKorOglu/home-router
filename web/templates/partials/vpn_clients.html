{{ define "vpn_clients" }}
{{ range .Tunnels }}
<div style="display:flex; align-items:center; justify-content:space-between; padding:var(--space-sm) 0; border-bottom:1px solid var(--border-color);">
    <div>
        <span style="font-weight:700;">{{ .Name }}</span>
        <span style="color:var(--text-secondary); font-size:var(--font-xs); margin-left:var(--space-sm);">{{ .Endpoint }}</span>
    </div>
    <div style="display:flex; align-items:center; gap:var(--space-sm);">
        {{ if .Transfer }}<span style="color:var(--text-secondary); font-size:var(--font-xs);">{{ .Transfer }}</span>{{ end }}
        {{ if .Active }}
            <span class="badge badge-success">{{ t $.Lang "vpn.status.active" }}</span>
        {{ else }}
            <span class="badge badge-error">{{ t $.Lang "vpn.status.inactive" }}</span>
        {{ end }}
    </div>
</div>
{{ end }}
{{ end }}

{{ define "policy_list" }}
<div data-sortable>
{{ range .Policies }}
<div style="display:flex; align-items:center; justify-content:space-between; padding:var(--space-sm) 0; border-bottom:1px solid var(--border-color);" data-name="{{ .Name }}">
    <div style="display:flex; align-items:center; gap:var(--space-md);">
        <span style="color:var(--text-tertiary); font-size:var(--font-xs); width:30px;">{{ .Priority }}</span>
        <div>
            <span style="font-weight:700;">{{ .Name }}</span>
            <span style="color:var(--text-secondary); font-size:var(--font-xs); margin-left:var(--space-sm);">→ {{ .Tunnel }}</span>
        </div>
    </div>
    <div style="display:flex; align-items:center; gap:var(--space-sm);">
        {{ if .Enabled }}
            <span class="badge badge-success">{{ t $.Lang "routing.enabled" }}</span>
        {{ else }}
            <span class="badge badge-error">{{ t $.Lang "routing.disabled" }}</span>
        {{ end }}
        <button class="btn btn-danger btn-sm" hx-delete="/routing/policy/{{ .Name }}" hx-swap="none"
                hx-confirm="{{ t $.Lang "common.confirm" }}">{{ t $.Lang "common.delete" }}</button>
    </div>
</div>
{{ end }}
</div>
{{ end }}

{{ define "pppoe-sniff" }}
<div class="card" style="margin-top:var(--space-lg);">
    <div class="card-header">
        <span class="card-title">{{ t .Lang "pppoe.title" }}</span>
    </div>
    <p style="color:var(--text-secondary); font-size:var(--font-sm); margin-bottom:var(--space-md);">
        {{ t .Lang "pppoe.captureDesc" }}
    </p>
    <div style="display:flex; gap:var(--space-sm);">
        <button class="btn btn-primary btn-sm" hx-post="/network/pppoe/sniff/start" hx-swap="none">{{ t .Lang "pppoe.startCapture" }}</button>
        <button class="btn btn-danger btn-sm" hx-post="/network/pppoe/sniff/stop" hx-swap="none">{{ t .Lang "pppoe.stopCapture" }}</button>
    </div>
</div>
{{ end }}

{{ define "ovpn_clients" }}
{{ range .Clients }}
<div style="display:flex; align-items:center; justify-content:space-between; padding:var(--space-sm) 0; border-bottom:1px solid var(--border-color);">
    <div>
        <span style="font-weight:700;">{{ .Name }}</span>
    </div>
    <div style="display:flex; gap:var(--space-sm);">
        <button class="btn btn-secondary btn-sm" hx-post="/openvpn/client/{{ .Name }}/connect" hx-swap="none">
            {{ t $.Lang "pppoe.connect" }}
        </button>
        <button class="btn btn-danger btn-sm" hx-post="/openvpn/client/{{ .Name }}/disconnect" hx-swap="none">
            {{ t $.Lang "pppoe.disconnect" }}
        </button>
    </div>
</div>
{{ end }}
{{ end }}
